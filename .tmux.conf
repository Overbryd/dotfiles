# lively colors, because I am human
set -g default-terminal 'tmux-256color'
set -as terminal-features ',xterm-256color:RGB:clipboard'
set -as terminal-features ',alacritty:RGB:clipboard'

# vim mode keys
setw -g mode-keys vi

# avoid CSI-u extended-key sequences leaking into apps/paste
set -s extended-keys off

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# mode mouse
setw -g mouse on

# monitor activity
setw -g monitor-activity on

# reattach to user namespace to enable mac osx clipboard
# set-option -g default-command "reattach-to-user-namespace -l $SHELL"

# set faster escape time (ms)
set escape-time 150

# setup proper select/copy
# let tmux talk to the outer terminal clipboard over OSC 52
set -g set-clipboard external
# 'v' to begin selection as in Vim
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
# update default binding of `Enter` to also use copy-pipe
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"

# keep selection
unbind MouseDragEnd1Pane

# r to reload tmux conf
bind r source-file ~/.tmux.conf \; display-message "Config reloaded."

# standard splits
bind - split-window -v

# K to respawn the current pane
bind K respawn-pane -k

# fuzzy-switch windows/panes with fzf popup (bound to C-b f)
unbind f
bind-key f display-popup -E "$HOME/dotfiles/tmux/plugins/fzf-window-switcher/bin/fzf-window-switcher" -w 90% -h 75% -x C -y C

# open or create a tmux session from recent/work/project directories (bound to C-b O)
bind-key O display-popup -E "$HOME/dotfiles/.bin/tms" -w 90% -h 75% -x C -y C

# start window numbers at 1 to match keyboard order with tmux window order
set -g base-index 1
set-window-option -g pane-base-index 1

# renumber windows sequentially after closing any of them
set -g renumber-windows on

# soften status bar color from harsh green to light gray
set -g status-bg colour255
set -g status-fg colour135

# remove administrative debris (session name, hostname, time) in status bar
set -g status-left ''
set -g status-right ''

# increase scrollback lines
set -g history-limit 100000

# enable focus events
set-option -g focus-events on

# Lets get a bell working (Alacritty does not support a bell)
set -g monitor-bell on
set -g bell-action other
set-hook -g alert-bell 'run-shell "afplay ~/Music/click2.wav"'

# Clear scrollback buffer using C-b C-k
bind -n C-k clear-history

